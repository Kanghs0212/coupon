<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATCH SEAT (캐치시트) - 티켓 예매 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; }

        /* 🎟️ 영수증(티켓) 가장자리를 파먹은 듯한 효과를 주는 CSS */
        .ticket-cutout {
            mask-image: radial-gradient(circle at 0 50%, transparent 10px, black 11px), radial-gradient(circle at 100% 50%, transparent 10px, black 11px);
            mask-size: 51% 100%;
            mask-repeat: no-repeat;
            mask-position: left, right;
        }

        /* 스크롤바 숨기기 (가로 스크롤 좌석 맵용) */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // JWT 디코딩 함수 (토큰에서 memberId와 username을 추출합니다)
    const parseJwt = (token) => {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        } catch (e) {
            return null;
        }
    };

    function App() {
        // 앱 화면 상태 관리 (login, signup, concertList, seat, mypage)
        const [view, setView] = useState('login');
        const [token, setToken] = useState(localStorage.getItem('jwt_token') || null);
        const [user, setUser] = useState(null);

        // 데이터 상태
        const [concerts, setConcerts] = useState([]);
        const [selectedConcert, setSelectedConcert] = useState(null);
        const [seats, setSeats] = useState([]);
        const [myReservations, setMyReservations] = useState([]);

        // 폼 상태
        const [username, setUsername] = useState('');
        const [password, setPassword] = useState('');
        const [name, setName] = useState('');

        // 토큰이 있으면 유저 정보 세팅 후 콘서트 목록 띄우기
        useEffect(() => {
            if (token) {
                const decoded = parseJwt(token);
                if (decoded) {
                    setUser(decoded);
                    fetchConcerts();
                    setView('concertList');
                } else {
                    handleLogout();
                }
            }
        }, [token]);

        // --- API 통신 함수들 ---

        // 1. 로그인
        const handleLogin = async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('http://localhost:8080/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (res.ok) {
                    const data = await res.text();
                    localStorage.setItem('jwt_token', data);
                    setToken(data);
                } else {
                    alert(`❌ 로그인 실패: ${await res.text()}`);
                }
            } catch(error) {
                alert('서버에 연결할 수 없습니다. 백엔드가 켜져있는지 확인하세요.');
            }
        };

        // 2. 회원가입
        const handleSignup = async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('http://localhost:8080/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, name })
                });
                if (res.ok) {
                    alert('회원가입 성공! 로그인을 진행해주세요.');
                    setView('login');
                } else {
                    alert(`❌ 가입 실패: ${await res.text()}`);
                }
            } catch(error) {
                alert('서버에 연결할 수 없습니다.');
            }
        };

        // 3. 로그아웃
        const handleLogout = () => {
            localStorage.removeItem('jwt_token');
            setToken(null);
            setUser(null);
            setView('login');
            setUsername('');
            setPassword('');
        };

        // 🌟 4. [동적] 전체 콘서트 목록 가져오기
        const fetchConcerts = async () => {
            try {
                const res = await fetch('http://localhost:8080/concerts');
                if(res.ok) {
                    setConcerts(await res.json());
                }
            } catch (error) {
                console.error("콘서트 목록을 불러오지 못했습니다.", error);
            }
        };

        // 🌟 5. [동적] 특정 콘서트의 좌석 데이터 가져오기 (🔥 완벽 정렬 로직 적용)
        const fetchSeats = async (concert) => {
            setSelectedConcert(concert);
            try {
                const res = await fetch(`http://localhost:8080/concerts/${concert.id}/seats`);
                if(res.ok) {
                    const data = await res.json();

                    // 🔥 완벽 방어: 불안정한 id 대신 "가격"과 "좌석 이름"을 기준으로 똑똑하게 정렬합니다!
                    const sortedSeats = data.sort((a, b) => {
                        // 1. 가격이 비싼 좌석(VIP석 등)을 먼저 배치 (내림차순)
                        if (b.price !== a.price) return b.price - a.price;

                        // 2. 같은 등급의 좌석이라면 이름('1번', '10번')의 숫자 크기를 자동으로 인식하여 정렬 (자연 정렬)
                        return a.seatName.localeCompare(b.seatName, undefined, { numeric: true, sensitivity: 'base' });
                    });

                    // React가 상태 변화를 확실히 감지하도록 새 배열로 교체
                    setSeats([...sortedSeats]);
                    setView('seat'); // 좌석 선택 화면으로 이동
                }
            } catch (error) {
                console.error("좌석 목록을 불러오지 못했습니다.", error);
            }
        };

        // 🌟 6. 좌석 예매하기 (Redis Queue 찌르기)
        const handleReserve = async (seat) => {
            if (!user) return;

            // 이미 예매된 좌석 방어 로직
            if (seat.status === 'RESERVED') {
                alert('이미 예매가 완료된 좌석입니다. 다른 좌석을 선택해주세요!');
                return;
            }

            const isConfirm = window.confirm(`[${seat.seatName}] 좌석을 예매하시겠습니까?\n가격: ${seat.price.toLocaleString()}원`);
            if (!isConfirm) return;

            try {
                const res = await fetch(`http://localhost:8080/concerts/${selectedConcert.id}/reserve?seatId=${seat.id}&memberId=${user.memberId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    alert(`🎉 예매 요청이 완료되었습니다!\n마이페이지로 이동합니다.`);
                    fetchMyReservations(); // 예매 성공 시 내 영수증 갱신
                    setView('mypage');
                } else {
                    alert(`😭 예매 실패: ${await res.text()}`);
                }
            } catch (error) {
                alert('서버 오류로 예매에 실패했습니다.');
            }
        };

        // 🌟 7. 내 예매 내역(영수증) 불러오기
        const fetchMyReservations = async () => {
            if (!user) return;
            try {
                const res = await fetch(`http://localhost:8080/reservations/me?memberId=${user.memberId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    setMyReservations(await res.json());
                }
            } catch (error) {
                console.error("내역을 불러오지 못했습니다.", error);
            }
        };


        // --- UI 컴포넌트 렌더링 영역 ---

        // 네비게이션 바 컴포넌트
        const Navbar = () => (
            <nav className="bg-gray-900 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
                {/* 🌟 로고 이름을 CATCH SEAT으로 변경 */}
                <h1 className="text-2xl font-black text-red-500 tracking-tighter cursor-pointer" onClick={() => user && setView('concertList')}>
                    CATCH SEAT
                </h1>
                {user && (
                    <div className="flex items-center gap-4">
                        <span className="text-sm font-medium hidden md:inline">{user.sub} 님 환영합니다</span>
                        <button onClick={() => {fetchMyReservations(); setView('mypage');}} className="text-sm font-bold text-gray-300 hover:text-white">
                            마이페이지
                        </button>
                        <button onClick={handleLogout} className="text-xs border border-gray-600 px-3 py-1 rounded font-bold hover:bg-gray-800 transition">
                            로그아웃
                        </button>
                    </div>
                )}
            </nav>
        );

        return (
            <div className="min-h-screen flex flex-col bg-gray-100">
                <Navbar />

                <main className="flex-1 max-w-6xl w-full mx-auto p-4 md:p-8">

                    {/* 1. 로그인 화면 */}
                    {view === 'login' && (
                        <div className="bg-white p-8 rounded-xl shadow-lg max-w-md mx-auto mt-10 border border-gray-200">
                            <h2 className="text-2xl font-bold mb-6 text-center text-gray-800">로그인</h2>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="text" placeholder="아이디" value={username} onChange={e=>setUsername(e.target.value)} required className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none" />
                                <input type="password" placeholder="비밀번호" value={password} onChange={e=>setPassword(e.target.value)} required className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none" />
                                <button type="submit" className="w-full bg-red-600 text-white p-3 rounded-lg font-bold hover:bg-red-700 transition">로그인</button>
                            </form>
                            <p className="mt-4 text-center text-sm text-gray-500 cursor-pointer hover:underline" onClick={() => setView('signup')}>회원가입하기</p>
                        </div>
                    )}

                    {/* 2. 회원가입 화면 */}
                    {view === 'signup' && (
                        <div className="bg-white p-8 rounded-xl shadow-lg max-w-md mx-auto mt-10 border border-gray-200">
                            <h2 className="text-2xl font-bold mb-6 text-center text-gray-800">회원가입</h2>
                            <form onSubmit={handleSignup} className="space-y-4">
                                <input type="text" placeholder="아이디" value={username} onChange={e=>setUsername(e.target.value)} required className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-gray-800 outline-none" />
                                <input type="password" placeholder="비밀번호" value={password} onChange={e=>setPassword(e.target.value)} required className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-gray-800 outline-none" />
                                <input type="text" placeholder="이름" value={name} onChange={e=>setName(e.target.value)} required className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-gray-800 outline-none" />
                                <button type="submit" className="w-full bg-gray-800 text-white p-3 rounded-lg font-bold hover:bg-gray-900 transition">가입하기</button>
                            </form>
                            <p className="mt-4 text-center text-sm text-gray-500 cursor-pointer hover:underline" onClick={() => setView('login')}>로그인으로 돌아가기</p>
                        </div>
                    )}

                    {/* 🌟 3. 콘서트 목록 화면 (갤러리 형태 - 동적 렌더링) */}
                    {view === 'concertList' && (
                        <div>
                            <h2 className="text-3xl font-bold mb-8 text-gray-800">🔥 티켓오픈 / 단독판매</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {concerts.map(c => (
                                    <div key={c.id} className="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300 cursor-pointer group" onClick={() => fetchSeats(c)}>
                                        <div className="h-64 bg-gray-200 relative overflow-hidden flex items-center justify-center">
                                            {/* 🛠️ 에러 방어 로직 추가: 엑박일 경우 예쁜 기본 썸네일 렌더링 (CATCH SEAT 문구 반영) */}
                                            <img
                                                src={c.posterUrl || `https://picsum.photos/seed/${c.id + 10}/400/300`}
                                                alt={c.title}
                                                onError={(e) => {
                                                    e.target.onerror = null;
                                                    e.target.src = `https://placehold.co/400x300/1f2937/ffffff?text=Catch+Seat`;
                                                }}
                                                className="w-full h-full object-cover group-hover:scale-105 transition duration-500"
                                            />
                                            <div className="absolute top-3 left-3 bg-red-600 text-white text-xs font-bold px-2 py-1 rounded shadow">예매중</div>
                                        </div>
                                        <div className="p-6">
                                            <h3 className="text-xl font-bold text-gray-900 mb-2 truncate">{c.title}</h3>
                                            <p className="text-sm text-gray-500 flex items-center"><span className="mr-2">📍</span>{c.venue}</p>
                                            <button className="mt-5 w-full border-2 border-red-600 text-red-600 font-bold py-2 rounded-lg group-hover:bg-red-600 group-hover:text-white transition">
                                                예매하기
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* 🌟 4. 다이나믹 좌석 맵 화면 (포도알) */}
                    {view === 'seat' && selectedConcert && (
                        <div className="bg-white p-6 md:p-8 rounded-xl shadow-lg border border-gray-200">
                            <div className="flex justify-between items-center mb-6 border-b pb-4">
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-800">{selectedConcert.title}</h2>
                                    <p className="text-sm text-gray-500 mt-1">{selectedConcert.venue} | 좌석 선택</p>
                                </div>
                                <button onClick={() => setView('concertList')} className="text-gray-500 bg-gray-100 px-4 py-2 rounded-lg hover:bg-gray-200 font-medium text-sm transition">
                                    목록으로 돌아가기
                                </button>
                            </div>

                            <div className="bg-gray-800 text-white text-center py-4 rounded-xl mb-12 text-2xl font-black tracking-[0.5em] shadow-inner">
                                STAGE
                            </div>

                            {/* 동적 그리드 좌석 렌더링 (DB에서 받아온 개수만큼 포도알 생성) */}
                            <div className="flex justify-center mb-12 overflow-x-auto hide-scrollbar pb-4">
                                <div className="grid grid-cols-10 gap-2 md:gap-3">
                                    {seats.map(seat => {
                                        // DB의 status가 'RESERVED'면 회색으로 비활성화 처리
                                        const isReserved = seat.status === 'RESERVED';
                                        return (
                                            <button
                                                key={seat.id || seat.seatName}
                                                onClick={() => handleReserve(seat)}
                                                disabled={isReserved}
                                                title={`${seat.seatName} - ${seat.price.toLocaleString()}원`}
                                                className={`
                                                        w-8 h-8 md:w-10 md:h-10 rounded-t-xl rounded-b-sm shadow flex items-center justify-center transition-transform transform
                                                        ${isReserved
                                                    ? 'bg-gray-300 cursor-not-allowed opacity-50'
                                                    : seat.seatName.includes('VIP')
                                                        ? 'bg-purple-500 hover:bg-purple-400 hover:-translate-y-1 hover:shadow-lg'
                                                        : 'bg-green-500 hover:bg-green-400 hover:-translate-y-1 hover:shadow-lg'}
                                                    `}
                                            >
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* 좌석 범례 (Legend) */}
                            <div className="bg-gray-50 p-4 rounded-lg flex flex-wrap gap-6 justify-center items-center text-sm text-gray-600 font-medium border">
                                <div className="flex items-center"><span className="w-4 h-4 bg-purple-500 rounded block mr-2 shadow-sm"></span>VIP석</div>
                                <div className="flex items-center"><span className="w-4 h-4 bg-green-500 rounded block mr-2 shadow-sm"></span>일반석 / 스탠딩</div>
                                <div className="flex items-center"><span className="w-4 h-4 bg-gray-300 opacity-50 rounded block mr-2"></span>예매 완료 (선택 불가)</div>
                            </div>
                        </div>
                    )}

                    {/* 🌟 5. 마이페이지 (내 예매 내역 확인 화면) */}
                    {view === 'mypage' && (
                        <div className="max-w-3xl mx-auto mt-4">
                            <div className="flex justify-between items-end mb-6">
                                <h2 className="text-3xl font-black text-gray-800">마이 티켓</h2>
                                <button onClick={() => setView('concertList')} className="text-red-600 font-bold hover:underline text-sm">
                                    공연 목록으로 &rarr;
                                </button>
                            </div>

                            {myReservations.length === 0 ? (
                                <div className="bg-white p-16 rounded-xl shadow-lg border border-gray-200 text-center text-gray-400 font-medium">
                                    <span className="text-5xl block mb-4">🎫</span>
                                    아직 예매한 내역이 없습니다.
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {myReservations.map(res => (
                                        <div key={res.reservationId} className="flex bg-white rounded-xl shadow-md border overflow-hidden transition hover:shadow-lg">
                                            {/* 티켓 펀치 구멍 효과 디자인 적용 */}
                                            <div className="bg-red-600 w-6 flex-shrink-0 ticket-cutout"></div>

                                            <div className="p-6 flex-1 flex flex-col md:flex-row justify-between md:items-center">
                                                <div>
                                                    <span className="text-xs font-bold text-red-600 mb-1 block tracking-wider uppercase">예매완료</span>
                                                    <h3 className="text-xl font-bold text-gray-900 mb-2">{res.concertTitle}</h3>
                                                    <p className="text-sm text-gray-600 font-medium">
                                                        {res.seatName} <span className="mx-2 text-gray-300">|</span> {res.price.toLocaleString()}원
                                                    </p>
                                                </div>
                                                <div className="md:text-right border-t md:border-t-0 md:border-l pt-4 md:pt-0 md:pl-6 border-dashed border-gray-200 mt-4 md:mt-0">
                                                    <p className="text-xs text-gray-400 mb-1">예매번호: <span className="font-mono text-gray-800 font-bold">{res.reservationId}</span></p>
                                                    <p className="text-xs text-gray-400">결제일시: {new Date(res.reservedAt).toLocaleString()}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </main>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
